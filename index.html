
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0A0A0A">
<title>PASTEL DELIVERY CORURIPE</title>

<style>
html { background:#0A0A0A; color:#fff; }
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
font-family:Arial;
background:#0A0A0A;
color:#fff;
overflow-x:hidden;
}

header{
background:linear-gradient(135deg,#B8001A,#E8001D,#FF2040);
position:sticky;top:0;
}

.hdr{
display:flex;justify-content:space-between;align-items:center;
padding:12px 16px;max-width:480px;margin:auto;
}

.brand{
font-weight:900;
color:#FFD700;
text-transform:uppercase;
}

.tagline{
font-size:11px;
}

.cart-btn{
background:#FFD700;
border:none;
padding:10px 14px;
border-radius:30px;
font-weight:900;
}

.hero{
text-align:center;
padding:20px;
}

.chip{
background:#2E2E2E;
padding:6px 10px;
border-radius:20px;
font-size:11px;
}

main{max-width:480px;margin:auto;padding-bottom:120px}

.sec{
padding:15px;
font-weight:900;
color:#FFD700;
}

.pgrid{padding:0 12px}

.card{
background:#1A1A1A;
margin-bottom:10px;
padding:12px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.info{flex:1}

.name{font-weight:800}

.ing{
font-size:11px;
color:#888;
margin-top:3px;
}

.price{
color:#FFD700;
font-weight:900;
}

.btn{
background:#E8001D;
border:none;
color:#fff;
width:35px;
height:35px;
border-radius:50%;
font-size:18px;
}

</style>

</head>
<body>

<header>
<div class="hdr">
<div>
<div class="brand">🥟 PASTEL DELIVERY CORURIPE</div>
<div class="tagline">O MAIOR PASTEL 🔥 • SEX - DOM</div>
</div>
<button class="cart-btn" onclick="toggleCart()">🛒 <span id="c">0</span></button>
</div>
</header>

<div class="hero">
<div class="chip">🚀 DELIVERY & RETIRADA</div>
</div>

<main>

<div class="sec">FRANGO</div>
<div class="pgrid" id="frango"></div>

<div class="sec">CALABRESA</div>
<div class="pgrid" id="calabresa"></div>

<div class="sec">CARNE</div>
<div class="pgrid" id="carne"></div>

</main>

<script>

var TEL="5582981844022";

var MENU={
frango:[
{n:"Frango com Queijo",p:23,b:0,ing:"frango, queijo"},
{n:"Frango com Calabresa",p:23,b:0,ing:"frango, calabresa"},
{n:"Frango com Catupiry",p:23,b:0,ing:"frango, catupiry"}
],
calabresa:[
{n:"Calabresa com Queijo",p:23,b:0,ing:"calabresa, queijo"},
{n:"Misto com Calabresa",p:23,b:0,ing:"calabresa, presunto, queijo"}
],
carne:[
{n:"Carne com Queijo",p:23,b:0,ing:"carne, queijo"},
{n:"Misto com Carne",p:23,b:0,ing:"carne, presunto, queijo"}
]
};

var cart=[];
var pay="pix";
var type="entrega";

function render(){
Object.keys(MENU).forEach(k=>{
document.getElementById(k).innerHTML =
MENU[k].map((i,idx)=>`
<div class="card">
<div class="info">
<div class="name">${i.n}</div>
<div class="ing">${i.ing}</div>
<div class="price">R$ ${i.p},00</div>
</div>
<button class="btn" onclick="add('${k}',${idx})">+</button>
</div>
`).join("");
});
}

function add(sec,i){
cart.push(MENU[sec][i]);
document.getElementById("c").innerText=cart.length;
}

function calc(){
var sub=0;
var past=0;

for(let i of cart){
sub += i.p;

// só pastel conta
if(i.b===0) past++;
}

let fee=0;

if(pay==="credito") fee = past*1;
if(pay==="debito") fee = past*0.5;

let del = type==="entrega"?5:0;

return sub + fee + del;
}

function toggleCart(){
let total = calc();
alert("TOTAL: R$ "+total.toFixed(2));
}

render();

</script>

</body>
</html>
